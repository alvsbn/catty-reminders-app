name: CI

on:
  push:
    branches: lab2
  pull_request:
    branches: lab2 

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pytest pytest-playwright
          playwright install chromium

      - name: Run app in background
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8181 &
          for i in {1..20}; do
            curl -s http://127.0.0.1:8181 && break
            sleep 1
          done

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest -v --tb=short --junitxml=test_result.xml

      - name: Save test report
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml
