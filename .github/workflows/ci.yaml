name: CI

on:
  push:

jobs:
  ci:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pytest pytest-playwright
          playwright install chromium

      - name: Run app in background
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8181 &
          for i in {1..20}; do
            curl -s http://127.0.0.1:8181 && break
            sleep 1
          done

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest -v --tb=short --junitxml=test_result.xml

      - name: Save test report
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/alvsbn/catty-reminders-app:${{ github.sha }}
